# Bastion mesh E2E config: alice node (09-04)

[agent]
default_model = "llama3"
daily_budget_usd = 0.50

[session]
db_path = "/data/bastion-a.db"
autocompact_threshold = 0.80
keep_last_n = 50

[logging]
log_path = "/data/bastion-a.log"

[mcp]
tool_call_timeout_secs = 30

[channels.telegram]
enabled = false

[channels.webhook]
enabled = true

[mesh]
sync_interval = 1

[[mesh.peer]]
owner_id = "bob"
peer_url = "http://bastion-b:8080"
age_pubkey = "BOB_AGE_PUBKEY_PLACEHOLDER"
allowed_tags = ["test"]
