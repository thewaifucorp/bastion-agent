# docker-compose.yml — Bastion v3
# D-04: Two-network split — core on bastion-net + egress-net; Python servers on bastion-net only
# D-06: core service built from the repository Dockerfile
# D-07: Caddy dropped — Telegram long-polling only (no public ingress)

services:
  # ── Volume init (PKG-08) ────────────────────────────────────────────────────
  # Docker creates named volumes root-owned. core (UID 1000) and the Python servers
  # (UID 1001) run non-root, so writable named volumes are initialized explicitly.
  # This one-shot busybox sidecar fixes data-volume ownership before the services
  # start, then exits. Read-only mounts (personas, skills, bastion.toml)
  # are NOT touched — only writable data volumes.
  volume-init:
    image: busybox:stable
    user: "0:0"
    network_mode: "none"
    command:
      - sh
      - -c
      - |
        mkdir -p /bastion-home/.config /bastion-home/.local/share/opencode /bastion-home/.claude /bastion-home/.codex /bastion-home/.acpx &&
        chown -R ${BASTION_UID:-1000}:${BASTION_GID:-1000} /bastion-data /bastion-home /claude-home /codex-home /acpx-home /opencode-home &&
        chown -R 1001:1001 /memupalace-data /skill-writer-data /self-improving-data &&
        echo "volume ownership initialized (core=${BASTION_UID:-1000}:${BASTION_GID:-1000}, python=1001:1001)"
    volumes:
      - bastion-data:/bastion-data
      - bastion-home:/bastion-home
      - claude-home:/claude-home
      - codex-home:/codex-home
      - acpx-home:/acpx-home
      - opencode-home:/opencode-home
      - memupalace-data:/memupalace-data
      - skill-writer-data:/skill-writer-data
      - self-improving-data:/self-improving-data
    restart: "no"

  # ── Rust core ─────────────────────────────────────────────────────────────
  core:
    build: .
    image: bastion-core:latest
    restart: unless-stopped
    # Non-root user (PKG-08); UID/GID can match the host for bind mounts.
    # Volume ownership is fixed up-front by the volume-init sidecar (depends_on below).
    user: "${BASTION_UID:-1000}:${BASTION_GID:-1000}"
    networks:
      - bastion-net    # reaches memupalace, skill-writer, self-improving
      - egress-net     # reaches Anthropic, OpenAI, Telegram APIs (D-04)
    # WEB-CMD-01: webhook/cockpit channel (`bastion chat`, mobile app) — bound inside
    # the container on a hardcoded :8080 (see BASTION_WEBHOOK_ADDR below), published
    # on loopback by default. Set BASTION_PUBLISH_HOST explicitly only when a reverse
    # proxy or remote client must reach the port; never claim every host interface for
    # a local-only install.
    # ⚠️ The container-side port here (right of the ":") is intentionally fixed at
    # 8080 to match the hardcoded BASTION_WEBHOOK_ADDR in `environment:` below — only
    # BASTION_HTTP_PORT (the host side) is meant to be configured.
    ports:
      - "${BASTION_PUBLISH_HOST:-127.0.0.1}:${BASTION_HTTP_PORT:-8080}:8080"
    volumes:
      - bastion-data:/bastion-data                # sessions.db + bastion.log
      - bastion-home:/home/bastion                 # whole HOME (UID match, ~/.claude.json persistence);
                                                    # the 4 credential sub-volumes below mount on top
      - claude-home:/home/bastion/.claude          # Claude Code subscription login
      - codex-home:/home/bastion/.codex            # Codex subscription login
      - acpx-home:/home/bastion/.acpx              # ACP runtime sessions
      - opencode-home:/home/bastion/.local/share/opencode # OpenCode login
      - ./personas:/personas:ro                   # SOUL.md files (D-02: bind-mount, no copy)
      - ./skills:/skills:ro                       # SKILL.md files (read-only)
      - ./bastion.toml:/bastion.toml:ro           # non-secret config (D-09)
      # Host-only updater uses this narrow Unix-socket bridge. The core gets
      # neither Docker's socket nor a writable source checkout.
      - ./.bastion:/bastion-updater
    environment:
      - BASTION_CONFIG=/bastion.toml
      - BASTION__SESSION__DB_PATH=/bastion-data/sessions.db
      - BASTION__LOGGING__LOG_PATH=/bastion-data/bastion.log
      - BASTION__MCP__SERVERS__MEMUPALACE__URL=http://memupalace:8001/mcp
      - BASTION__MCP__SERVERS__SKILL_WRITER__URL=http://skill-writer:8002/mcp
      - BASTION__MCP__SERVERS__SELF_IMPROVING__URL=http://self-improving:8003/mcp
      - BASTION__MCP__SERVERS__VOICE__URL=http://voice:8004/mcp
      - BASTION_INFER_ADDR=0.0.0.0:3000
      - BASTION_INFER_TOKEN=${BASTION_INFER_TOKEN}
      # WEB-CMD-01: without this the webhook channel never starts (main.rs only
      # spawns it if BASTION_WEBHOOK_ADDR is set). Hardcoded (not ${VAR:-default})
      # on purpose — a stale BASTION_WEBHOOK_ADDR left over in .env/env_file must
      # never win over this and desync from the `ports:` mapping above, which
      # forwards host:BASTION_HTTP_PORT to container:8080 unconditionally.
      # APP_JWT_SECRET is required, fail-closed (WR-01). Both auto-generated by
      # installer.sh if missing.
      - BASTION_WEBHOOK_ADDR=0.0.0.0:8080
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - BASTION_BOOTSTRAP_TOKEN=${BASTION_BOOTSTRAP_TOKEN}
      - BASTION_UPDATER_SOCKET=/bastion-updater/updater.sock
      - BASTION_UPDATER_TOKEN=${BASTION_UPDATER_TOKEN}
      - BASTION_OWNER_ID=${BASTION_OWNER_ID:-_local}
      - BASTION__BACKEND__CONVERSATION=${BASTION_BACKEND_CONVERSATION:-model}
      - BASTION__BACKEND__AUTH=${BASTION_BACKEND_AUTH:-}
      # Observability (PKG): without RUST_LOG the EnvFilter suppresses ALL tracing events,
      # leaving bastion.log empty. Default to info so the soak is debuggable; override via env.
      - RUST_LOG=${RUST_LOG:-info}
    env_file: .env
    depends_on:
      volume-init:
        condition: service_completed_successfully
      memupalace:
        condition: service_healthy
      skill-writer:
        condition: service_healthy
      self-improving:
        condition: service_healthy
      voice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

  # ── Python MCP Servers ────────────────────────────────────────────────────
  # All Python servers: bastion-net ONLY (internal: true) — zero internet egress (D-04)
  # CORE_GATEWAY_URL: all Python servers call http://core:3000/api/infer (D-04)

  memupalace:
    build: skills/memupalace
    image: bastion-memupalace:latest
    restart: unless-stopped
    user: "1001:1001"
    networks:
      - bastion-net    # ONLY — zero egress invariant (D-02/D-04)
    volumes:
      - memupalace-data:/db/memupalace
    environment:
      - MEMUPALACE_PORT=8001
      - MEMUPALACE_CHROMA_PATH=/db/memupalace/chroma
      # The Qdrant repo ships model_optimized.onnx (NOT model_quantized.onnx) — wrong name here
      # caused FileNotFoundError at boot. It also ships the tokenizer alongside the .onnx, so we
      # load the tokenizer from /models + set offline flags → genuinely zero-egress at runtime
      # (it was downloading from HF every boot, which fails under an SSL-inspecting proxy like
      # Zscaler). This is what makes the D-02/D-04 egress invariant actually hold.
      - MEMUPALACE_ONNX_MODEL_PATH=/models/model_optimized.onnx
      - MEMUPALACE_TOKENIZER_NAME=/models
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      # SEC: callback to core gateway — Bearer token required (D-04)
      - CORE_GATEWAY_URL=http://core:3000/api/infer
      - BASTION_INFER_TOKEN=${BASTION_INFER_TOKEN}
    depends_on:
      volume-init:
        condition: service_completed_successfully
    healthcheck:
      # TCP liveness — fastmcp /mcp returns 406 to a plain GET; port open = alive.
      test: ["CMD", "python", "-c",
             "import socket,sys; s=socket.socket(); s.settimeout(4); sys.exit(s.connect_ex(('localhost',8001)))"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  skill-writer:
    build: skills/skill-writer
    image: bastion-skill-writer:latest
    restart: unless-stopped
    user: "1001:1001"
    networks:
      - bastion-net    # ONLY — zero egress invariant (D-04)
    volumes:
      - ./skills:/skills    # rw: skill-writer creates SKILL.md files
      - skill-writer-data:/data
    environment:
      - SKILL_WRITER_PORT=8002
      - SKILLS_DIR=/skills
      - SKILL_WRITER_PENDING_FILE=/data/pending_distillations.jsonl
      - MEMUPALACE_URL=http://memupalace:8001/mcp
      # SEC: callback to core gateway — Bearer token required (D-04)
      - CORE_GATEWAY_URL=http://core:3000/api/infer
      - BASTION_INFER_TOKEN=${BASTION_INFER_TOKEN}
    depends_on:
      volume-init:
        condition: service_completed_successfully
      memupalace:
        condition: service_healthy
    healthcheck:
      # TCP liveness (fastmcp /mcp returns 406 to plain GET — see memupalace note).
      test: ["CMD", "python", "-c",
             "import socket,sys; s=socket.socket(); s.settimeout(4); sys.exit(s.connect_ex(('localhost',8002)))"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

  self-improving:
    build: skills/self-improving
    image: bastion-self-improving:latest
    restart: unless-stopped
    user: "1001:1001"
    networks:
      - bastion-net    # ONLY — zero egress invariant (D-04)
    volumes:
      - ./skills:/skills:ro    # read-only — D-10: SELF never writes skills (T-03-06-04)
      - self-improving-data:/data
    environment:
      - SELF_IMPROVING_PORT=8003
      - SKILLS_DIR=/skills
      - SELF_SUGGESTIONS_FILE=/data/suggestions.jsonl
      - MEMUPALACE_URL=http://memupalace:8001/mcp
      # SEC: callback to core gateway — Bearer token required (D-04)
      - CORE_GATEWAY_URL=http://core:3000/api/infer
      - BASTION_INFER_TOKEN=${BASTION_INFER_TOKEN}
    depends_on:
      volume-init:
        condition: service_completed_successfully
      memupalace:
        condition: service_healthy
    healthcheck:
      # TCP liveness (fastmcp /mcp returns 406 to plain GET — see memupalace note).
      test: ["CMD", "python", "-c",
             "import socket,sys; s=socket.socket(); s.settimeout(4); sys.exit(s.connect_ex(('localhost',8003)))"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

  voice:
    build: skills/voice
    networks: [bastion-net]    # ONLY — zero egress invariant (VOICE-01/D-04): áudio nunca sai para a nuvem
    image: bastion-voice:latest
    restart: unless-stopped
    user: "1001:1001"
    # No volumes: the sidecar is stateless (no persistent DB, unlike memupalace) and
    # its STT/TTS models are baked into the image at build time — nothing to mount.
    # No CORE_GATEWAY_URL either: voice does pure local STT/TTS inference and never
    # calls back to the core inference gateway (unlike memupalace/skill-writer/self-improving).
    environment:
      - VOICE_PORT=8004
      - VOICE_WHISPER_MODEL_DIR=/models/whisper
      - VOICE_WHISPER_MODEL_SIZE=small
      - VOICE_KOKORO_MODEL_PATH=/models/kokoro/kokoro-v1.0.onnx
      - VOICE_KOKORO_VOICES_PATH=/models/kokoro/voices-v1.0.bin
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    depends_on:
      volume-init:
        condition: service_completed_successfully
    healthcheck:
      # TCP liveness (fastmcp /mcp returns 406 to plain GET — see memupalace note).
      test: ["CMD", "python", "-c",
             "import socket,sys; s=socket.socket(); s.settimeout(4); sys.exit(s.connect_ex(('localhost',8004)))"]
      interval: 10s
      timeout: 5s
      start_period: 45s
      retries: 3

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  bastion-net:
    driver: bridge
    internal: true     # D-02/D-04: Python MCP servers cannot reach internet
  egress-net:
    driver: bridge     # internet-capable; only core attaches here (D-04)

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  bastion-data:          # core: sessions.db + bastion.log
  bastion-home:          # core: whole /home/bastion (UID match, ~/.claude.json persistence)
  claude-home:           # Claude Code login and settings
  codex-home:            # Codex login and settings
  acpx-home:             # ACP runtime sessions
  opencode-home:         # OpenCode login
  memupalace-data:       # memupalace: KG + embeddings
  skill-writer-data:     # skill-writer: internal state
  self-improving-data:   # self-improving: analysis data
