name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      # The `voice` feature (default, and pulled by --all-features below) builds
      # cpal -> alsa-sys, which needs ALSA headers; native-tls needs OpenSSL.
      # The Docker image sidesteps this by building --no-default-features, but
      # `cargo clippy --all-features` / `cargo test` here do not.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev libssl-dev pkg-config
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - run: bash tests/test-installer.sh

  # Observability frontend A2: typecheck + build the web app. The rust job
  # deliberately does NOT depend on this — build.rs treats a missing
  # web/dist as a supported state.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: web
      - run: npm run build
        working-directory: web

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e './sdk/python[dev]'
      - run: pytest sdk/python/tests/

  distribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./installer.sh --prepare-only --non-interactive
      - run: docker compose config --quiet
      # Explicit --target: the Dockerfile gained a `runtime-devtools` stage
      # after `runtime` (git-capability's optional git binary) — `docker
      # build` defaults to the LAST stage, which would silently switch this
      # build to the devtools variant without this pin.
      - run: docker build --target runtime --tag bastion-ci .

  # Decision #18 (corporate-name scrub) — this repo is public; a leaked
  # proprietary name in a doc, comment, or config file is as much a leak as
  # one in code. Shared with bastion-core's copy of the same guard.
  scope-and-scrub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-scope-and-scrub.sh
