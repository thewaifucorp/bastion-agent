name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test

  # Decision #18 (corporate-name scrub) — this repo is public; a leaked
  # proprietary name in a doc, comment, or config file is as much a leak as
  # one in code. Shared with bastion-core's copy of the same guard.
  scope-and-scrub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-scope-and-scrub.sh
